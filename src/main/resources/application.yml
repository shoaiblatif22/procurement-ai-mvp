spring:
  application:
    name: procurement-ai

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/procurement_ai}
    username: ${SPRING_DATASOURCE_USERNAME:procuser}
    password: ${SPRING_DATASOURCE_PASSWORD:procpass}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: validate          # Flyway owns the schema — JPA only validates
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        default_schema: public

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true

  servlet:
    multipart:
      enabled: true
      max-file-size: 20MB
      max-request-size: 50MB

  data:
    redis:
      host: ${SPRING_REDIS_HOST:localhost}
      port: ${SPRING_REDIS_PORT:6379}

# ── App-specific config ────────────────────────────────────────
app:
  jwt:
    secret: ${APP_JWT_SECRET:dev-secret-change-in-production}
    expiry-ms: ${APP_JWT_EXPIRY_MS:86400000}

  # claude:                                    # Commented out — using Gemini instead
  #   api-key: ${CLAUDE_API_KEY:}
  #   model: ${CLAUDE_MODEL:claude-sonnet-4-6}
  #   base-url: https://api.anthropic.com/v1
  #   max-tokens: 2000
  #   timeout-seconds: 60

  gemini:
    api-key: ${GEMINI_API_KEY:}
    model: ${GEMINI_MODEL:gemini-2.0-flash}

  aws:
    region: ${AWS_REGION:eu-west-2}
    access-key: ${AWS_ACCESS_KEY_ID:}
    secret-key: ${AWS_SECRET_ACCESS_KEY:}
    s3:
      bucket: ${AWS_S3_BUCKET:procurement-docs-your-company}
      endpoint: ${AWS_S3_ENDPOINT:http://localhost:4566}        # LocalStack override
    textract:
      endpoint: ${AWS_TEXTRACT_ENDPOINT:http://localhost:4566}  # LocalStack override

  extraction:
    confidence-threshold: 0.90             # Below this: flag for human review
    max-pages: 50

# ── Logging ────────────────────────────────────────────────────
logging:
  level:
    com.procurementai: DEBUG
    org.flywaydb: INFO
    org.hibernate.SQL: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

# ── Actuator ───────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized
